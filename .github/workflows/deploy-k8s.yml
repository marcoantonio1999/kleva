name: Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: "Image tag to deploy (example: latest or sha-xxxx)"
        required: true
        default: "latest"
      runnerLabel:
        description: "Runner label: ubuntu-latest (cloud) or self-hosted (local cluster)"
        required: true
        default: "ubuntu-latest"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ${{ github.event.inputs.runnerLabel }}
    env:
      IMAGE_TAG: ${{ github.event.inputs.imageTag }}
      IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
      TWILIO_PHONE_NUMBER_SID: ${{ secrets.TWILIO_PHONE_NUMBER_SID }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: pwsh
        run: |
          $kubeDir = Join-Path $HOME ".kube"
          New-Item -ItemType Directory -Path $kubeDir -Force | Out-Null
          $bytes = [Convert]::FromBase64String("${{ secrets.KUBE_CONFIG_B64 }}")
          [IO.File]::WriteAllBytes((Join-Path $kubeDir "config"), $bytes)

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Sync app secrets
        shell: pwsh
        run: |
          kubectl -n kleva create secret generic kleva-secrets `
            --from-literal=OPENAI_API_KEY="$env:OPENAI_API_KEY" `
            --from-literal=TWILIO_ACCOUNT_SID="$env:TWILIO_ACCOUNT_SID" `
            --from-literal=TWILIO_AUTH_TOKEN="$env:TWILIO_AUTH_TOKEN" `
            --from-literal=TWILIO_PHONE_NUMBER="$env:TWILIO_PHONE_NUMBER" `
            --from-literal=TWILIO_PHONE_NUMBER_SID="$env:TWILIO_PHONE_NUMBER_SID" `
            --from-literal=PUBLIC_BASE_URL="$env:PUBLIC_BASE_URL" `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply base manifests
        run: kubectl apply -k k8s/

      - name: Set backend image
        shell: pwsh
        run: |
          kubectl -n kleva set image deployment/kleva-backend backend="$env:IMAGE_REGISTRY/kleva-backend:$env:IMAGE_TAG"

      - name: Set frontend image
        shell: pwsh
        run: |
          kubectl -n kleva set image deployment/kleva-frontend frontend="$env:IMAGE_REGISTRY/kleva-frontend:$env:IMAGE_TAG"

      - name: Wait for rollout
        run: |
          kubectl -n kleva rollout status deployment/kleva-backend --timeout=120s
          kubectl -n kleva rollout status deployment/kleva-frontend --timeout=120s
