apiVersion: apps/v1
kind: Deployment
metadata:
  name: kleva-backend
  namespace: kleva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kleva-backend
  template:
    metadata:
      labels:
        app: kleva-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/REPLACE_OWNER/kleva-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: kleva-config
            - secretRef:
                name: kleva-secrets
          volumeMounts:
            - name: backend-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: kleva-backend-data
